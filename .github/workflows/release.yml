name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override (example: 0.1.1)"
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WORKFLOW_INPUT_VERSION: ${{ github.event.inputs.version || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows
            dist_command: npm run dist:win -- --publish never
          - os: ubuntu-latest
            artifact_name: linux
            dist_command: npm run dist:linux -- --publish never
          - os: macos-latest
            artifact_name: macos
            dist_command: npm run dist:mac -- --publish never

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve build version
        run: |
          node -e "const fs=require('node:fs'); const semver=/^\\d+\\.\\d+\\.\\d+(?:-[0-9A-Za-z.-]+)?(?:\\+[0-9A-Za-z.-]+)?$/; const pkgPath='package.json'; const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8')); const input=(process.env.WORKFLOW_INPUT_VERSION||'').trim(); const refType=process.env.GITHUB_REF_TYPE||''; const refName=process.env.GITHUB_REF_NAME||''; let resolved=''; if (input) { if (!semver.test(input)) { console.error('Invalid workflow_dispatch version input:', input); process.exit(1); } resolved=input; } else if (refType==='tag') { const fromTag=refName.replace(/^v/,''); if (!semver.test(fromTag)) { console.error('Invalid tag for versioning:', refName); process.exit(1); } resolved=fromTag; } else { resolved=pkg.version; } if (!semver.test(resolved)) { console.error('Resolved version is invalid:', resolved); process.exit(1); } if (pkg.version!==resolved) { pkg.version=resolved; fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\\n'); } console.log('Resolved build version:', resolved);"

      - name: Build distributable
        run: ${{ matrix.dist_command }}

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: |
            release/**/*.AppImage
            release/**/*-Setup.exe
            release/**/*.dmg
            release/**/*.blockmap
            release/**/latest*.yml
            release/**/app-update.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-artifacts/**/*-Setup.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.blockmap
            release-artifacts/**/latest*.yml
            release-artifacts/**/app-update.yml
