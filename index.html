<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#EEF4EE" />
    <script>
      (function () {
        var storageKey = 'echosphere:appearance'
        var systemDarkModeQuery = '(prefers-color-scheme: dark)'
        var darkThemeColor = '#171717'
        var lightThemeColor = '#EEF4EE'

        try {
          var cachedPreference = window.localStorage.getItem(storageKey)
          var appearance =
            cachedPreference === 'light' || cachedPreference === 'dark' || cachedPreference === 'system'
              ? cachedPreference
              : 'system'
          var resolvedTheme =
            appearance === 'dark' ||
            (appearance === 'system' &&
              typeof window.matchMedia === 'function' &&
              window.matchMedia(systemDarkModeQuery).matches)
              ? 'dark'
              : 'light'
          var root = document.documentElement
          root.dataset.theme = resolvedTheme
          root.dataset.themePreference = appearance
          root.style.colorScheme = resolvedTheme

          var themeMetaTag = document.querySelector('meta[name="theme-color"]')
          if (themeMetaTag) {
            themeMetaTag.setAttribute('content', resolvedTheme === 'dark' ? darkThemeColor : lightThemeColor)
          }
        } catch {}
      })()
    </script>
    <title>EchoSphere</title>
  </head>
  <body spellcheck="false">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
